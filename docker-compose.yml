version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - redis
    env_file:
      - .env
    volumes:
      - ./backend:/app

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4318:4318"

  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - backend
    # volume configuration can be added here for nginx.conf later

volumes:
  qdrant_storage:
  grafana_data:
